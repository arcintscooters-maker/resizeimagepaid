<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome — PixelPrep</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #f5f2ee; --surface: #fff; --border: #e0d9cf; --text: #1a1714; --muted: #8c8278; --accent: #c84b2f; --success: #2a7a4b; }
    body { background: var(--bg); font-family: 'DM Mono', monospace; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; text-align: center; }
    .icon { font-size: 48px; margin-bottom: 20px; }
    h1 { font-family: 'Instrument Serif', serif; font-size: 32px; margin-bottom: 10px; }
    p { font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 28px; }
    .btn { display: inline-block; background: var(--text); color: #f5f2ee; text-decoration: none; border-radius: 8px; padding: 14px 32px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>You're all set!</h1>
    <p>Your subscription is active. Start processing your product images now — unlimited, optimised, and ready for your store.</p>
    <a class="btn" href="/">Start processing images</a>
  </div>
</body>
</html>

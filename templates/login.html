<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in — PixelPrep</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #f5f2ee; --surface: #ffffff; --surface2: #f0ece6; --border: #e0d9cf; --text: #1a1714; --muted: #8c8278; --accent: #c84b2f; --success: #2a7a4b; }
    body { background: var(--bg); font-family: 'DM Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; }
    .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 28px; }
    .logo span { color: var(--accent); }
    .trial-badge { display: inline-block; background: #edf7f1; border: 1px solid #b8dfc9; color: var(--success); font-size: 11px; padding: 4px 12px; border-radius: 20px; margin-bottom: 20px; }
    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
    .tab { flex: 1; background: none; border: none; padding: 10px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
    .tab.active { color: var(--text); border-bottom-color: var(--text); }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], input[type="email"], input[type="password"] { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; padding: 11px 14px; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); transition: border-color 0.15s; }
    input:focus { outline: none; border-color: var(--text); }
    .btn { width: 100%; background: var(--text); color: #f5f2ee; border: none; border-radius: 8px; padding: 13px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; margin-top: 6px; transition: opacity 0.15s; }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .msg { margin-top: 14px; font-size: 12px; padding: 11px 14px; border-radius: 8px; display: none; line-height: 1.5; }
    .msg.error { display: block; background: #fdf0ee; border: 1px solid #f0c4bc; color: var(--accent); }
    .msg.success { display: block; background: #edf7f1; border: 1px solid #b8dfc9; color: var(--success); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    .features { display: flex; flex-direction: column; gap: 7px; }
    .feature { font-size: 11px; color: var(--muted); display: flex; gap: 8px; }
    .feature::before { content: 'checkmark'; content: '✓'; color: var(--success); font-weight: 700; flex-shrink: 0; }
    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Pixel<span>Prep</span></div>
    <div class="trial-badge">7-day free trial — no card required</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign in</button>
      <button class="tab" onclick="switchTab('signup')">Create account</button>
    </div>
    <div class="panel active" id="panel-login">
      <div class="form-group">
        <label>Username or Email</label>
        <input type="text" id="login-identifier" placeholder="username or email" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn" id="btn-login" onclick="doLogin()">Sign in</button>
      <div class="msg" id="msg-login"></div>
    </div>
    <div class="panel" id="panel-signup">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="signup-username" placeholder="yourname" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password <span style="color:var(--muted);font-size:10px;">(min 8 characters)</span></label>
        <input type="password" id="signup-password" placeholder="••••••••" autocomplete="new-password"/>
      </div>
      <button class="btn" id="btn-signup" onclick="doSignup()">Create account &amp; start trial</button>
      <div class="msg" id="msg-signup"></div>
    </div>
    <hr class="divider"/>
    <div class="features">
      <div class="feature">7-day free trial — no credit card needed</div>
      <div class="feature">Then SGD 1.99/month, cancel anytime</div>
      <div class="feature">Unlimited images with AI background removal</div>
      <div class="feature">Smart resize + custom canvas + 24 colour presets</div>
    </div>
  </div>
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i===0)===(tab==='login')));
      document.getElementById('panel-login').classList.toggle('active', tab==='login');
      document.getElementById('panel-signup').classList.toggle('active', tab==='signup');
    }
    function setMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + type;
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('panel-login').classList.contains('active')) doLogin();
        else doSignup();
      }
    });
    async function doLogin() {
      const btn = document.getElementById('btn-login');
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        const res = await fetch('/auth/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ identifier: document.getElementById('login-identifier').value.trim(), password: document.getElementById('login-password').value }) });
        const data = await res.json();
        if (res.ok) { window.location.href = data.redirect || '/'; }
        else { setMsg('msg-login', data.error, 'error'); btn.disabled=false; btn.textContent='Sign in'; }
      } catch { setMsg('msg-login','Something went wrong.','error'); btn.disabled=false; btn.textContent='Sign in'; }
    }
    async function doSignup() {
      const btn = document.getElementById('btn-signup');
      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        const res = await fetch('/auth/signup', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ username: document.getElementById('signup-username').value.trim(), email: document.getElementById('signup-email').value.trim(), password: document.getElementById('signup-password').value }) });
        const data = await res.json();
        if (res.ok) { window.location.href = data.redirect || '/'; }
        else { setMsg('msg-signup', data.error, 'error'); btn.disabled=false; btn.textContent='Create account & start trial'; }
      } catch { setMsg('msg-signup','Something went wrong.','error'); btn.disabled=false; btn.textContent='Create account & start trial'; }
    }
  </script>
</body>
</html>

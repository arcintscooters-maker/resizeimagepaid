<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — PixelPrep</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #f5f2ee; --surface: #ffffff; --surface2: #f0ece6; --border: #e0d9cf; --text: #1a1714; --muted: #8c8278; --accent: #c84b2f; --success: #2a7a4b; }
    body { background: var(--bg); font-family: 'DM Mono', monospace; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
    .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 28px; }
    .logo span { color: var(--accent); }
    h1 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    p { font-size: 12px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
    label { display: block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    input[type="password"] { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; padding: 11px 14px; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); margin-bottom: 14px; transition: border-color 0.15s; }
    input:focus { outline: none; border-color: var(--text); }
    .btn { width: 100%; background: var(--text); color: #f5f2ee; border: none; border-radius: 8px; padding: 13px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .msg { margin-top: 14px; font-size: 12px; padding: 11px 14px; border-radius: 8px; display: none; }
    .msg.error { display: block; background: #fdf0ee; border: 1px solid #f0c4bc; color: var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Pixel<span>Prep</span></div>
    <h1>Set new password</h1>
    <p>Enter a new password for your account. Must be at least 8 characters.</p>
    <label>New password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="new-password"/>
    <label>Confirm password</label>
    <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password"/>
    <button class="btn" id="btn" onclick="doReset()">Set new password</button>
    <div class="msg" id="msg"></div>
  </div>
  <script>
    const token = "{{ token }}";
    async function doReset() {
      const btn = document.getElementById('btn');
      const pw = document.getElementById('password').value;
      const cf = document.getElementById('confirm').value;
      const msg = document.getElementById('msg');
      if (pw !== cf) { msg.textContent = 'Passwords do not match.'; msg.className = 'msg error'; return; }
      if (pw.length < 8) { msg.textContent = 'Password must be at least 8 characters.'; msg.className = 'msg error'; return; }
      btn.disabled = true; btn.textContent = 'Saving...';
      try {
        const res = await fetch('/auth/reset-password', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ token, password: pw }) });
        const data = await res.json();
        if (res.ok) { window.location.href = data.redirect || '/'; }
        else { msg.textContent = data.error; msg.className = 'msg error'; btn.disabled = false; btn.textContent = 'Set new password'; }
      } catch { msg.textContent = 'Something went wrong.'; msg.className = 'msg error'; btn.disabled = false; btn.textContent = 'Set new password'; }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
  </script>
</body>
</html>
